    <style>
      :root {
        --ink: #16181d; --paper: #ffffff; --muted: #5b6472; --faint: #5f6877;
        --line: #e6e8ec; --soft: #f6f7f9; --accent: #1f4ed8; --accent-ink: #1736a8;
        --serif: ui-serif, Georgia, "Times New Roman", serif;
        --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --ink: #e8eaed; --paper: #0f1115; --muted: #9aa3b2; --faint: #6b7280;
          --line: #262a31; --soft: #171a20; --accent: #7c9bff; --accent-ink: #a9bdff;
        }
      }
      * { box-sizing: border-box; }
      .staticrypt-html, .staticrypt-body { height: 100%; }
      .staticrypt-body { margin: 0; }
      .staticrypt-content {
        min-height: 100%; margin: 0; background: var(--soft); color: var(--ink);
        font-family: var(--sans); -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
        display: flex; align-items: center; justify-content: center; padding: 24px;
      }
      .staticrypt-page { width: 100%; max-width: 430px; }
      .staticrypt-form {
        background: var(--paper); border: 1px solid var(--line); border-radius: 16px;
        padding: 36px 34px; box-shadow: 0 10px 34px rgba(0, 0, 0, 0.07);
      }
      .staticrypt-eyebrow {
        font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.12em;
        text-transform: uppercase; color: var(--faint); margin: 0 0 14px;
      }
      .staticrypt-title {
        font-family: var(--serif); font-weight: 600; font-size: 1.6rem; line-height: 1.2;
        letter-spacing: -0.01em; color: var(--ink); margin: 0 0 8px;
      }
      .staticrypt-instructions { margin: 0 0 22px; }
      .staticrypt-instructions p { margin: 0; color: var(--muted); font-size: 0.98rem; line-height: 1.55; }
      .staticrypt-password-container { position: relative; margin: 0 0 14px; }
      .staticrypt-form input[type="password"],
      .staticrypt-form input[type="text"] {
        width: 100%; border: 1px solid var(--line); border-radius: 10px; background: var(--soft);
        color: var(--ink); font-family: var(--sans); font-size: 1rem; padding: 13px 44px 13px 14px; outline: 0;
      }
      .staticrypt-form input[type="password"]:focus,
      .staticrypt-form input[type="text"]:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
      }
      .staticrypt-toggle-password-visibility {
        position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
        width: 20px; height: 20px; padding: 0; opacity: 0.5; cursor: pointer;
      }
      label.staticrypt-remember {
        display: flex; align-items: center; gap: 9px; margin: 0 0 18px;
        font-size: 0.9rem; color: var(--muted); cursor: pointer;
      }
      .staticrypt-remember input[type="checkbox"] {
        width: 16px; height: 16px; accent-color: var(--accent); margin: 0;
      }
      .staticrypt-decrypt-button {
        width: 100%; border: 1px solid var(--accent); background: var(--accent); color: #fff;
        font-family: var(--sans); font-weight: 600; font-size: 0.98rem; padding: 12px 16px;
        border-radius: 10px; cursor: pointer; outline: 0;
      }
      .staticrypt-decrypt-button:hover,
      .staticrypt-decrypt-button:focus { background: var(--accent-ink); border-color: var(--accent-ink); }
      .staticrypt-error { color: #dc2626; font-size: 0.88rem; line-height: 1.4; margin: -2px 0 14px; display: none; }
      .staticrypt-error.show { display: block; }
      .staticrypt-spinner-container {
        height: 100%; display: flex; align-items: center; justify-content: center; background: var(--soft);
      }
      .staticrypt-spinner {
        width: 2rem; height: 2rem; border: 0.25em solid var(--line); border-right-color: var(--accent);
        border-radius: 50%; animation: staticrypt-spin 0.75s linear infinite;
      }
      @keyframes staticrypt-spin { 100% { transform: rotate(360deg); } }
      .hidden { display: none !important; }
      @media screen and (-webkit-min-device-pixel-ratio: 0) {
        .staticrypt-form input[type="password"],
        .staticrypt-form input[type="text"] { font-size: 16px; }
      }
    </style>
  </head>

    <script>

      const templateError = "/*[|template_error|]*/0",

        rememberExpirationKey: "staticrypt_expiration",
        rememberPassphraseKey: "staticrypt_passphrase",
        replaceHtmlCallback: null,
        clearLocalStorageCallback: null,
      };

      // init the staticrypt engine
      const staticrypt = staticryptInitiator.init(staticryptConfig, templateConfig);

      // try to automatically decrypt on load if there is a saved password
      window.onload = async function () {
        const { isSuccessful } = await staticrypt.handleDecryptOnLoad();

        // if we didn't decrypt anything on load, show the password prompt. Otherwise the content has already been
        // replaced, no need to do anything
        if (!isSuccessful) {
          // hide loading screen
          document.getElementById("staticrypt_loading").classList.add("hidden");
          document.getElementById("staticrypt_content").classList.remove("hidden");
          document.getElementById("staticrypt-password").focus();

        if (passwordInput.type === "password") {
          passwordInput.type = "text";
          toggleIcon.src = imgSrcEyeOpened;
          toggleIcon.alt = templateToggleAltHide;
          toggleIcon.title = templateToggleAltHide;
        } else {
          passwordInput.type = "password";
          toggleIcon.src = imgSrcEyeClosed;
          toggleIcon.alt = templateToggleAltShow;
          toggleIcon.title = templateToggleAltShow;
        }
      });

      // handle password form submission
      document.getElementById("staticrypt-form").addEventListener("submit", async function (e) {
        e.preventDefault();

        const errorEl = document.getElementById("staticrypt-error");
        errorEl.classList.remove("show");

        const password = document.getElementById("staticrypt-password").value,
          isRememberChecked = document.getElementById("staticrypt-remember").checked;

        const { isSuccessful } = await staticrypt.handleDecryptionOfPage(password, isRememberChecked);

        if (!isSuccessful) {
          errorEl.classList.add("show");
        }
      });
